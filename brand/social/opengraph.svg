<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <!-- OpenGraph social share image -->
  <defs>
    <linearGradient id="og-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0E1012"/>
      <stop offset="100%" stop-color="#2A2E34"/>
    </linearGradient>
    <linearGradient id="og-mark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFA800"/>
      <stop offset="100%" stop-color="#F08C00"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#og-bg)"/>

  <!-- Logo mark -->
  <rect x="100" y="100" width="100" height="100" rx="24" fill="url(#og-mark)"/>
  <path d="M170 140 a28 28 0 1 0 0 30" stroke="#fff" stroke-width="9" fill="none" stroke-linecap="round"/>
  <circle cx="170" cy="140" r="6" fill="#fff"/>

  <!-- Headline -->
  <text x="100" y="320" font-family="Plus Jakarta Sans, Inter, system-ui, sans-serif" font-size="84" font-weight="800" fill="#FFFFFF" letter-spacing="-2">CheeTaxi</text>
  <text x="100" y="395" font-family="Inter, system-ui, sans-serif" font-size="36" font-weight="500" fill="#B0B5BC">Fast. Reliable. African. Modern.</text>

  <!-- Pillars -->
  <text x="100" y="500" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="600" fill="#F08C00">Passengers ride free · Drivers keep 100% · One subscription</text>
  <text x="100" y="540" font-family="Inter, system-ui, sans-serif" font-size="20" fill="#7F8590">The most modern mobility platform designed for Africa.</text>

  <!-- URL -->
  <text x="100" y="600" font-family="Inter, system-ui, sans-serif" font-size="20" fill="#5A606B">cheetaxi.africa</text>
</svg>
