<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 64" fill="none">
  <!-- CheeTaxi primary horizontal logo -->
  <defs>
    <linearGradient id="brand-gradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFA800"/>
      <stop offset="100%" stop-color="#F08C00"/>
    </linearGradient>
  </defs>
  <!-- Mark -->
  <rect x="0" y="8" width="48" height="48" rx="12" fill="url(#brand-gradient)"/>
  <!-- Stylized "C" cut from the mark -->
  <path d="M34 22 a14 14 0 1 0 0 20" stroke="#fff" stroke-width="5" fill="none" stroke-linecap="round"/>
  <!-- Pin dot in the negative space -->
  <circle cx="34" cy="22" r="3" fill="#fff"/>
  <!-- Wordmark -->
  <text x="60" y="42" font-family="Plus Jakarta Sans, Inter, system-ui, sans-serif" font-size="28" font-weight="800" fill="#0E1012" letter-spacing="-0.5">CheeTaxi</text>
</svg>
