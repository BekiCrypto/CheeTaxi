name: Accessibility & Performance Audit

on:
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 4 * * 1'  # Weekly Monday 04:00 UTC

jobs:
  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build landing
        run: pnpm --filter @cheetaxi/web-landing build

      - name: Start landing server
        run: |
          pnpm --filter @cheetaxi/web-landing start &
          sleep 5

      - name: Run Lighthouse CI
        run: |
          npm install -g @lhci/cli
          cd apps/web-landing
          lhci autorun || echo "LHCI failed — non-blocking"

      - name: Upload Lighthouse report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-report
          path: apps/web-landing/.lighthouseci/
