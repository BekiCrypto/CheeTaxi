name: Security Scan

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 6 * * 1'  # Weekly Monday 06:00 UTC

jobs:
  # ─── Dependency vulnerability scan ───────────────────────────────────────
  dependency-scan:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Run pnpm audit (high severity blocking)
        run: |
          pnpm audit --audit-level=high --prod
        continue-on-error: false

      - name: Generate SBOM (CycloneDX)
        run: |
          npx --yes @cyclonedx/cyclonedx-npm --output-file sbom.json --output-format JSON
        continue-on-error: true

      - name: Upload SBOM
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json

  # ─── Container image vulnerability scan ──────────────────────────────────
  container-scan:
    name: Container Scan (Trivy)
    runs-on: ubuntu-latest
    needs: dependency-scan
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      matrix:
        target: [api, web-landing, web-admin, web-dispatcher]
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/${{ matrix.target }}/Dockerfile
          push: false
          tags: cheetaxi-${{ matrix.target }}:scan
          load: true

      - name: Trivy scan (HIGH + CRITICAL)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: cheetaxi-${{ matrix.target }}:scan
          severity: HIGH,CRITICAL
          exit-code: '1'
          format: json
          output: trivy-${{ matrix.target }}.json

      - name: Upload Trivy report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-${{ matrix.target }}
          path: trivy-${{ matrix.target }}.json

  # ─── CodeQL static analysis ──────────────────────────────────────────────
  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      matrix:
        language: [javascript-typescript]
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-extended

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: '/language:${{ matrix.language }}'
