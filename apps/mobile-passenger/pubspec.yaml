name: cheetaxi_passenger
description: CheeTaxi — Passenger app. Free, reliable, modern mobility for Africa.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # State management
  provider: ^6.1.2
  riverpod: ^2.5.1
  flutter_riverpod: ^2.5.1
  # Network
  dio: ^5.5.0
  web_socket_channel: ^3.0.0
  # Maps & location
  google_maps_flutter: ^2.7.0
  geolocator: ^12.0.0
  flutter_polyline_points: ^2.0.0
  # Auth & storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.0
  # Notifications
  firebase_core: ^3.3.0
  firebase_messaging: ^15.0.4
  flutter_local_notifications: ^17.2.2
  # Payments
  flutter_stripe: ^10.1.1
  # UI
  cached_network_image: ^3.4.0
  flutter_svg: ^2.0.10
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  # Utilities
  intl: ^0.19.0
  uuid: ^4.4.0
  geocoding: ^3.0.0
  url_launcher: ^6.3.0
  share_plus: ^9.0.0
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/
    - assets/icons/
