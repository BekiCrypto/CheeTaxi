name: cheetaxi_driver
description: CheeTaxi — Driver app. Pay one subscription, keep 100% of every fare.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  flutter_riverpod: ^2.5.1
  dio: ^5.5.0
  web_socket_channel: ^3.0.0
  google_maps_flutter: ^2.7.0
  geolocator: ^12.0.0
  flutter_polyline_points: ^2.0.0
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.0
  firebase_core: ^3.3.0
  firebase_messaging: ^15.0.4
  flutter_local_notifications: ^17.2.2
  cached_network_image: ^3.4.0
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  intl: ^0.19.0
  uuid: ^4.4.0
  permission_handler: ^11.3.1
  share_plus: ^9.0.0
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/
